name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Windows 빌드 ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile

      - name: ffmpeg 설치 및 복사 (APE 재생용)
        run: |
          choco install ffmpeg -y
          copy "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "ffmpeg.exe"
        shell: cmd

      - name: PyInstaller 빌드
        run: |
          pyinstaller `
            --name "니콘 친게 HiFi Player" `
            --windowed `
            --icon icon.ico `
            --add-data "constants.py;." `
            --add-data "ui_widgets.py;." `
            --add-data "player_window.py;." `
            --add-data "audio_engine.py;." `
            --add-data "dsd_decoder.py;." `
            --add-data "sacd_decoder.py;." `
            --add-data "upnp_browser.py;." `
            --add-data "ffmpeg.exe;." `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import scipy `
            --hidden-import scipy.signal `
            --hidden-import sounddevice `
            --hidden-import mutagen `
            --hidden-import mutagen.flac `
            --hidden-import mutagen.mp3 `
            --hidden-import mutagen.mp4 `
            --hidden-import mutagen.id3 `
            --collect-all scipy `
            --collect-all sounddevice `
            --noconfirm `
            main.py

      - name: Inno Setup 설치
        run: choco install innosetup -y

      - name: 설치 파일 생성 (Inno Setup)
        run: iscc installer.iss

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/니콘_친게_HiFi_Player_Setup_1.0.0.exe
          retention-days: 30

  # ── macOS 빌드 (공통 스텝을 matrix로 처리) ──────────────────
  build-macos:
    strategy:
      matrix:
        include:
          - runs-on: macos-14    # Apple Silicon (M1/M2/M3)
            arch: arm64
            artifact: macos-dmg-arm64
            dmg: 니콘_친게_HiFi_Player-1.0.0-arm64.dmg
          - runs-on: macos-13    # Intel x86_64
            arch: x86_64
            artifact: macos-dmg-x86_64
            dmg: 니콘_친게_HiFi_Player-1.0.0-x86_64.dmg
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile

      - name: ffmpeg 설치 (APE 재생용)
        run: brew install ffmpeg

      - name: PyInstaller 빌드
        run: |
          pyinstaller \
            --name "니콘 친게 HiFi Player" \
            --windowed \
            --icon icon.icns \
            --osx-bundle-identifier com.twsemicon.hifi-player \
            --add-data "constants.py:." \
            --add-data "ui_widgets.py:." \
            --add-data "player_window.py:." \
            --add-data "audio_engine.py:." \
            --add-data "dsd_decoder.py:." \
            --add-data "sacd_decoder.py:." \
            --add-data "upnp_browser.py:." \
            --hidden-import PyQt5 \
            --hidden-import scipy \
            --hidden-import scipy.signal \
            --hidden-import sounddevice \
            --hidden-import mutagen \
            --collect-all scipy \
            --collect-all sounddevice \
            --noconfirm \
            main.py

      - name: ffmpeg 번들 포함
        run: cp $(which ffmpeg) "dist/니콘 친게 HiFi Player.app/Contents/MacOS/ffmpeg"

      - name: Ad-hoc 코드사이닝
        run: codesign --force --deep --sign - "dist/니콘 친게 HiFi Player.app" || echo "codesign 실패 (무시)"

      - name: DMG 생성
        run: |
          hdiutil create -volname "니콘 친게 HiFi Player" \
            -srcfolder "dist/니콘 친게 HiFi Player.app" \
            -ov -format UDZO \
            "dist/${{ matrix.dmg }}"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.dmg }}
          retention-days: 30
