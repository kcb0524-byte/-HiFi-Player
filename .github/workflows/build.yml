name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Windows 빌드 ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile miniaudio

      - name: ffmpeg 설치 및 복사 (APE 재생용)
        run: |
          choco install ffmpeg -y
          copy "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "ffmpeg.exe"
        shell: cmd

      - name: MinGW(GCC) 경로 설정
        run: |
          echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: libdst.dll 빌드 (DST SACD ISO 디코더)
        run: |
          cd libdst
          gcc -O2 -DNDEBUG -shared `
            buffer_pool.c ccp_calc.c dst_ac.c dst_data.c `
            dst_fram.c dst_init.c unpack_dst.c yarn.c dst_wrapper.c `
            -o ../libdst.dll
          echo "libdst.dll 빌드 완료"
          dir ../libdst.dll
        shell: pwsh

      - name: PyInstaller 빌드
        run: |
          pyinstaller `
            --name "Nikon Chinge HiFi Player" `
            --windowed `
            --icon icon.ico `
            --add-data "constants.py;." `
            --add-data "ui_widgets.py;." `
            --add-data "player_window.py;." `
            --add-data "audio_engine.py;." `
            --add-data "dsd_decoder.py;." `
            --add-data "sacd_decoder.py;." `
            --add-data "dst_ctypes.py;." `
            --add-data "sacd_ffmpeg.py;." `
            --add-data "upnp_browser.py;." `
            --add-data "ffmpeg.exe;." `
            --add-binary "libdst.dll;." `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import PyQt5.sip `
            --hidden-import scipy `
            --hidden-import scipy.signal `
            --hidden-import scipy.signal._upfirdn `
            --hidden-import scipy.signal._upfirdn_apply `
            --hidden-import scipy.signal._sosfilt `
            --hidden-import scipy.signal.windows `
            --hidden-import scipy.fft `
            --hidden-import scipy.fft._pocketfft `
            --hidden-import scipy._lib `
            --hidden-import scipy._lib.messagestream `
            --hidden-import scipy.interpolate `
            --hidden-import sounddevice `
            --hidden-import miniaudio `
            --hidden-import mutagen `
            --hidden-import mutagen.flac `
            --hidden-import mutagen.mp3 `
            --hidden-import mutagen.mp4 `
            --hidden-import mutagen.id3 `
            --hidden-import struct `
            --hidden-import threading `
            --hidden-import socket `
            --hidden-import urllib.request `
            --hidden-import xml.etree.ElementTree `
            --collect-all scipy `
            --collect-all sounddevice `
            --noconfirm `
            main.py

      - name: scipy 테스트 파일 제거 (용량 최적화)
        run: |
          Get-ChildItem -Path "dist\Nikon Chinge HiFi Player\_internal" -Recurse -Directory -Filter "tests" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        shell: powershell

      - name: 번들 필수 라이브러리 검증 (누락 시 빌드 실패)
        shell: pwsh
        run: |
          # miniaudio 누락으로 무음 앱이 배포됐던 사고 재발 방지 검사
          $root = "dist/Nikon Chinge HiFi Player"
          $checks = [ordered]@{
            "miniaudio 네이티브" = "_miniaudio*"
            "libsndfile"         = "libsndfile*"
            "portaudio"          = "*portaudio*"
            "ffmpeg.exe"         = "ffmpeg.exe"
            "libdst.dll"         = "libdst.dll"
          }
          $fail = $false
          foreach ($k in $checks.Keys) {
            $hit = Get-ChildItem -Path $root -Recurse -Filter $checks[$k] -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($hit) { Write-Host "OK       $k -> $($hit.FullName)" }
            else      { Write-Host "MISSING  $k ($($checks[$k]))"; $fail = $true }
          }
          if ($fail) { Write-Error "필수 라이브러리 누락 — 빌드 중단"; exit 1 }

      - name: Inno Setup 설치
        run: choco install innosetup -y

      - name: installer.iss 생성
        run: |
          $iss = @"
          #pragma encoding "utf-8"
          [Setup]
          AppName=Nikon Chinge HiFi Player
          AppVersion=3.1
          AppPublisher=Nikon Chinge
          DefaultDirName={autopf}\Nikon Chinge HiFi Player
          DefaultGroupName=Nikon Chinge HiFi Player
          OutputDir=dist
          OutputBaseFilename=NikonChingeHiFiPlayer_Setup_3.1
          SetupIconFile=icon.ico
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ChangesAssociations=yes

          [Languages]
          Name: "korean"; MessagesFile: "compiler:Languages\Korean.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"; GroupDescription: "Additional tasks:"

          [Files]
          Source: "dist\Nikon Chinge HiFi Player\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Nikon Chinge HiFi Player"; Filename: "{app}\Nikon Chinge HiFi Player.exe"
          Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Nikon Chinge HiFi Player"; Filename: "{app}\Nikon Chinge HiFi Player.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Nikon Chinge HiFi Player.exe"; Description: "Launch Nikon Chinge HiFi Player"; Flags: nowait postinstall skipifsilent

          [Registry]
          Root: HKCR; Subkey: "NikonChingeHiFiPlayer.AudioFile"; ValueType: string; ValueName: ""; ValueData: "Audio File"; Flags: uninsdeletekey
          Root: HKCR; Subkey: "NikonChingeHiFiPlayer.AudioFile\DefaultIcon"; ValueType: string; ValueName: ""; ValueData: "{app}\Nikon Chinge HiFi Player.exe,0"
          Root: HKCR; Subkey: "NikonChingeHiFiPlayer.AudioFile\shell\open\command"; ValueType: string; ValueName: ""; ValueData: """{app}\Nikon Chinge HiFi Player.exe"" ""%1"""
          Root: HKCR; Subkey: ".flac\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".wav\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".aiff\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".aif\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".mp3\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".m4a\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".aac\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".ogg\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".opus\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".wv\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".ape\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".tta\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".wma\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".dsf\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".dff\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          Root: HKCR; Subkey: ".iso\OpenWithProgids"; ValueType: string; ValueName: "NikonChingeHiFiPlayer.AudioFile"; ValueData: ""; Flags: uninsdeletevalue
          "@
          [System.IO.File]::WriteAllText("$PWD\installer_win.iss", $iss, [System.Text.UTF8Encoding]::new($true))
        shell: powershell

      - name: 설치 파일 생성 (Inno Setup)
        run: iscc installer_win.iss

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/NikonChingeHiFiPlayer_Setup_3.1.exe
          retention-days: 30

  # ── macOS 빌드 (Apple Silicon) ─────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile miniaudio

      - name: ffmpeg 설치 (APE 재생용)
        run: brew install ffmpeg

      - name: libdst.dylib 빌드 (DST SACD ISO 디코더)
        run: |
          cd libdst
          gcc -O2 -DNDEBUG -shared -fPIC \
            buffer_pool.c ccp_calc.c dst_ac.c dst_data.c \
            dst_fram.c dst_init.c unpack_dst.c yarn.c dst_wrapper.c \
            -o ../libdst.dylib
          echo "libdst.dylib 빌드 완료"
          ls -lh ../libdst.dylib

      - name: PyInstaller 빌드
        run: |
          pyinstaller \
            --name "Nikon Chinge HiFi Player" \
            --windowed \
            --icon icon.icns \
            --osx-bundle-identifier com.twsemicon.hifi-player \
            --add-data "constants.py:." \
            --add-data "ui_widgets.py:." \
            --add-data "player_window.py:." \
            --add-data "audio_engine.py:." \
            --add-data "dsd_decoder.py:." \
            --add-data "sacd_decoder.py:." \
            --add-data "dst_ctypes.py:." \
            --add-data "sacd_ffmpeg.py:." \
            --add-data "upnp_browser.py:." \
            --add-binary "libdst.dylib:." \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.sip \
            --hidden-import scipy \
            --hidden-import scipy.signal \
            --hidden-import scipy.signal._upfirdn \
            --hidden-import scipy.signal._upfirdn_apply \
            --hidden-import scipy.signal._sosfilt \
            --hidden-import scipy.signal.windows \
            --hidden-import scipy.fft \
            --hidden-import scipy.fft._pocketfft \
            --hidden-import scipy._lib \
            --hidden-import scipy._lib.messagestream \
            --hidden-import scipy.interpolate \
            --hidden-import sounddevice \
            --hidden-import miniaudio \
            --hidden-import mutagen \
            --hidden-import mutagen.flac \
            --hidden-import mutagen.mp3 \
            --hidden-import mutagen.mp4 \
            --hidden-import mutagen.id3 \
            --collect-all scipy \
            --collect-all sounddevice \
            --noconfirm \
            main.py

      - name: scipy 테스트 파일 제거
        run: |
          find "dist/Nikon Chinge HiFi Player.app" -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find "dist/Nikon Chinge HiFi Player.app" -name "*.pyx" -delete 2>/dev/null || true
          find "dist/Nikon Chinge HiFi Player.app" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: Info.plist 파일 연결(CFBundleDocumentTypes) 등록
        run: |
          python3 - "dist/Nikon Chinge HiFi Player.app/Contents/Info.plist" <<'PYEOF'
          import sys, plistlib
          plist_path = sys.argv[1]
          with open(plist_path, 'rb') as f:
              plist = plistlib.load(f)
          audio_exts = [
              'flac', 'wav', 'aiff', 'aif',
              'mp3', 'm4a', 'aac',
              'ogg', 'opus',
              'wv', 'ape', 'tta', 'wma',
              'dsf', 'dff', 'iso',
          ]
          plist['CFBundleDocumentTypes'] = [{
              'CFBundleTypeName': 'Audio File',
              'CFBundleTypeExtensions': audio_exts,
              'CFBundleTypeRole': 'Viewer',
              'LSHandlerRank': 'Alternate',
          }]
          with open(plist_path, 'wb') as f:
              plistlib.dump(plist, f)
          print(f'CFBundleDocumentTypes 등록 완료 ({len(audio_exts)}개 확장자)')
          PYEOF

      - name: ffmpeg 번들 포함
        run: cp $(which ffmpeg) "dist/Nikon Chinge HiFi Player.app/Contents/MacOS/ffmpeg"

      - name: 번들 필수 라이브러리 검증 (누락 시 빌드 실패)
        run: |
          # miniaudio 누락으로 무음 앱이 배포됐던 사고 재발 방지 검사
          # (macOS 재생 장치는 miniaudio 기반 — 없으면 재생 상태만 되고 무음)
          APP="dist/Nikon Chinge HiFi Player.app"
          fail=0
          for pat in "_miniaudio*" "libsndfile*" "libportaudio*" "ffmpeg"; do
            hit=$(find "$APP" -name "$pat" | head -1)
            if [ -n "$hit" ]; then
              echo "OK       $pat → $hit"
            else
              echo "MISSING  $pat"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "필수 라이브러리 누락 — 빌드 중단"; exit 1; }

      - name: Ad-hoc 코드사이닝
        run: |
          codesign --force --deep --sign - \
            "dist/Nikon Chinge HiFi Player.app" || true

      - name: DMG 생성
        run: |
          hdiutil create -volname "Nikon Chinge HiFi Player" \
            -srcfolder "dist/Nikon Chinge HiFi Player.app" \
            -ov -format UDZO \
            "dist/NikonChingeHiFiPlayer-3.1-arm64.dmg"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: dist/NikonChingeHiFiPlayer-3.1-arm64.dmg
          retention-days: 30
