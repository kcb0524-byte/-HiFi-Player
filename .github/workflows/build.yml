name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Windows 빌드 ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile

      - name: ffmpeg 설치 및 복사 (APE 재생용)
        run: |
          choco install ffmpeg -y
          copy "C:\ProgramData\chocolatey\bin\ffmpeg.exe" "ffmpeg.exe"
        shell: cmd

      - name: PyInstaller 빌드
        run: |
          pyinstaller `
            --name "Nikon Chinge HiFi Player" `
            --windowed `
            --icon icon.ico `
            --add-data "constants.py;." `
            --add-data "ui_widgets.py;." `
            --add-data "player_window.py;." `
            --add-data "audio_engine.py;." `
            --add-data "dsd_decoder.py;." `
            --add-data "sacd_decoder.py;." `
            --add-data "upnp_browser.py;." `
            --add-data "ffmpeg.exe;." `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import PyQt5.sip `
            --hidden-import scipy `
            --hidden-import scipy.signal `
            --hidden-import scipy.signal._upfirdn `
            --hidden-import scipy.signal._upfirdn_apply `
            --hidden-import scipy.signal._sosfilt `
            --hidden-import scipy.signal.windows `
            --hidden-import scipy.fft `
            --hidden-import scipy.fft._pocketfft `
            --hidden-import scipy._lib `
            --hidden-import scipy._lib.messagestream `
            --hidden-import scipy.interpolate `
            --hidden-import sounddevice `
            --hidden-import mutagen `
            --hidden-import mutagen.flac `
            --hidden-import mutagen.mp3 `
            --hidden-import mutagen.mp4 `
            --hidden-import mutagen.id3 `
            --hidden-import struct `
            --hidden-import threading `
            --hidden-import socket `
            --hidden-import urllib.request `
            --hidden-import xml.etree.ElementTree `
            --collect-all scipy `
            --collect-all sounddevice `
            --noconfirm `
            main.py

      - name: scipy 테스트 파일 제거 (용량 최적화)
        run: |
          Get-ChildItem -Path "dist\Nikon Chinge HiFi Player\_internal" -Recurse -Directory -Filter "tests" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        shell: powershell

      - name: Inno Setup 설치
        run: choco install innosetup -y

      - name: installer.iss 생성
        run: |
          $iss = @"
          #pragma encoding "utf-8"
          [Setup]
          AppName=Nikon Chinge HiFi Player
          AppVersion=1.0.0
          AppPublisher=Nikon Chinge
          DefaultDirName={autopf}\Nikon Chinge HiFi Player
          DefaultGroupName=Nikon Chinge HiFi Player
          OutputDir=dist
          OutputBaseFilename=NikonChingeHiFiPlayer_Setup_1.0.0
          SetupIconFile=icon.ico
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern

          [Languages]
          Name: "korean"; MessagesFile: "compiler:Languages\Korean.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"; GroupDescription: "Additional tasks:"

          [Files]
          Source: "dist\Nikon Chinge HiFi Player\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Nikon Chinge HiFi Player"; Filename: "{app}\Nikon Chinge HiFi Player.exe"
          Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Nikon Chinge HiFi Player"; Filename: "{app}\Nikon Chinge HiFi Player.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Nikon Chinge HiFi Player.exe"; Description: "Launch Nikon Chinge HiFi Player"; Flags: nowait postinstall skipifsilent
          "@
          # UTF-8 BOM 포함으로 저장 — Inno Setup 6은 UTF-8 BOM을 올바르게 처리함
          [System.IO.File]::WriteAllText("$PWD\installer_win.iss", $iss, [System.Text.UTF8Encoding]::new($true))
        shell: powershell

      - name: 설치 파일 생성 (Inno Setup)
        run: iscc installer_win.iss

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/NikonChingeHiFiPlayer_Setup_1.0.0.exe
          retention-days: 30

  # ── macOS 빌드 (Apple Silicon) ─────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install PyQt5 numpy scipy sounddevice mutagen soundfile

      - name: ffmpeg 설치 (APE 재생용)
        run: brew install ffmpeg

      - name: PyInstaller 빌드
        run: |
          pyinstaller \
            --name "Nikon Chinge HiFi Player" \
            --windowed \
            --icon icon.icns \
            --osx-bundle-identifier com.twsemicon.hifi-player \
            --add-data "constants.py:." \
            --add-data "ui_widgets.py:." \
            --add-data "player_window.py:." \
            --add-data "audio_engine.py:." \
            --add-data "dsd_decoder.py:." \
            --add-data "sacd_decoder.py:." \
            --add-data "upnp_browser.py:." \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.sip \
            --hidden-import scipy \
            --hidden-import scipy.signal \
            --hidden-import scipy.signal._upfirdn \
            --hidden-import scipy.signal._upfirdn_apply \
            --hidden-import scipy.signal._sosfilt \
            --hidden-import scipy.signal.windows \
            --hidden-import scipy.fft \
            --hidden-import scipy.fft._pocketfft \
            --hidden-import scipy._lib \
            --hidden-import scipy._lib.messagestream \
            --hidden-import scipy.interpolate \
            --hidden-import sounddevice \
            --hidden-import mutagen \
            --hidden-import mutagen.flac \
            --hidden-import mutagen.mp3 \
            --hidden-import mutagen.mp4 \
            --hidden-import mutagen.id3 \
            --collect-all scipy \
            --collect-all sounddevice \
            --noconfirm \
            main.py

      - name: scipy 테스트 파일 제거
        run: |
          find "dist/Nikon Chinge HiFi Player.app" -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find "dist/Nikon Chinge HiFi Player.app" -name "*.pyx" -delete 2>/dev/null || true
          find "dist/Nikon Chinge HiFi Player.app" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: ffmpeg 번들 포함
        run: cp $(which ffmpeg) "dist/Nikon Chinge HiFi Player.app/Contents/MacOS/ffmpeg"

      - name: entitlements 적용 및 Ad-hoc 코드사이닝
        run: |
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            "dist/Nikon Chinge HiFi Player.app" || \
          codesign --force --deep --sign - \
            "dist/Nikon Chinge HiFi Player.app" || true

      - name: DMG 생성
        run: |
          hdiutil create -volname "Nikon Chinge HiFi Player" \
            -srcfolder "dist/Nikon Chinge HiFi Player.app" \
            -ov -format UDZO \
            "dist/NikonChingeHiFiPlayer-1.0.0-arm64.dmg"

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: dist/NikonChingeHiFiPlayer-1.0.0-arm64.dmg
          retention-days: 30
